<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNS Lookup</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-dot"></div>
        <span class="topbar-title">Network Monitor</span>
      </div>
      <div class="topbar-nav">
        <a href="/static/index.html" class="nav-link">Monitor</a>
        <a href="/static/dns_lookup/dns.html" class="nav-link active">DNS Lookup</a>  
      </div>
      <div class="topbar-right">
        <div class="status-pill">
          <div class="pulse"></div>
          <span class="status-text">API running</span>
        </div>
        <div class="model-pill">
          <span class="model-text">Ollama</span>
          <span class="model-divider">|</span>
          <span class="model-name">llama3.2</span>
        </div>
      </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="dns-single">

      <div class="glass-card">
        <div class="card-header">DNS Lookup</div>
        <label class="input-label">Domain or IP address</label>
        <input
          class="input-field"
          id="dns-input"
          type="text"
          placeholder="example.com or 1.1.1.1"
        />
        <button class="btn-add" id="btn-lookup">Lookup</button>
        <div class="error-msg" id="dns-error"></div>
      </div>

      <div class="glass-card" id="dns-results" style="display:none;">
        <div class="section-title">DNS Results</div>
        <div id="dns-body"></div>
      </div>

      <div class="glass-card" id="dns-ai-card" style="display:none;">
        <div class="ai-header">
          <span class="section-title">AI Diagnostic</span>
          <div class="ai-badge">
            <span class="ai-badge-by">powered by</span>
            <span class="ai-badge-model">ollama / llama3.2</span>
          </div>
        </div>
        <div class="ai-body" id="dns-ai-body">
          Click Analyze to get a diagnostic summary.
        </div>
      </div>

    </div>
  </div>

  <script src="dns.js"></script>
</body>
</html>
